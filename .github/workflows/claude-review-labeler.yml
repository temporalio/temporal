# Adds the Claude review request label to PRs from opted-in team members.
#
# Uses `pull_request_target` so the workflow has access to secrets even when
# a PR is opened from a fork. This is safe because the workflow does not check
# out or run PR code.
name: Request Claude review for opted-in teams

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

env:
  # Space- or newline-separated list of temporalio team slugs whose
  # members' PRs should receive an automated Claude review. Empty means only
  # manually labeled PRs are reviewed.
  REVIEW_TEAMS: "nexus"
  REVIEW_OPT_IN_LABEL: request-claude-review
  REVIEW_OPT_OUT_LABEL: skip-claude-review

jobs:
  request-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 2
    permissions:
      issues: write
    steps:
      - name: Generate app token
        id: generate_token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.TEMPORAL_AI_REVIEW_APP_ID }}
          private-key: ${{ secrets.TEMPORAL_AI_REVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          # Least-privilege: members:read for team-membership lookups,
          # pull-requests:read for PR metadata, and
          # issues:read for PR label lookups.
          permission-members: read
          permission-pull-requests: read
          permission-issues: read
      - id: decision
        env:
          CHECK_TOKEN: ${{ steps.generate_token.outputs.token }}
          LABEL_TOKEN: ${{ github.token }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          skip_label() {
            echo "Skipping Claude review label for PR #${PR_NUMBER}: $1"
            exit 0
          }

          add_review_label() {
            echo "Adding label '${REVIEW_OPT_IN_LABEL}' to PR #${PR_NUMBER}: $1"
            GH_TOKEN="$LABEL_TOKEN" gh issue edit "$PR_NUMBER" \
              --repo "$REPO" \
              --add-label "$REVIEW_OPT_IN_LABEL"
            exit 0
          }

          has_label() {
            printf '%s\n' "$labels" | awk -v label="$1" 'tolower($0) == tolower(label) { found = 1 } END { exit !found }'
          }

          require_org_member() {
            user="$1"
            role="$2"

            echo "Checking temporalio organization membership for ${role} ${user}"
            if response=$(GH_TOKEN="$CHECK_TOKEN" gh api \
                -H "Accept: application/vnd.github+json" \
                "/orgs/temporalio/memberships/${user}" 2>&1); then
              if [ "$(echo "$response" | jq -r '.state')" != "active" ]; then
                skip_label "${role} is not an active temporalio organization member"
              fi
            elif echo "$response" | grep -q "HTTP 404"; then
              skip_label "${role} is not a temporalio organization member"
            else
              echo "Unexpected error checking temporalio organization membership for ${role} ${user}: ${response}" >&2
              exit 1
            fi
            echo "${role} ${user} is an active temporalio organization member"
          }

          require_repo_write() {
            user="$1"
            role="$2"

            echo "Checking repository write permission for ${role} ${user}"
            if response=$(GH_TOKEN="$CHECK_TOKEN" gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO}/collaborators/${user}/permission" 2>&1); then
              permission=$(echo "$response" | jq -r '.permission')
              case "$permission" in
                admin|write)
                  echo "${role} ${user} has repository ${permission} permission"
                  ;;
                *)
                  skip_label "${role} has repository ${permission} permission, not write/admin"
                  ;;
              esac
            elif echo "$response" | grep -q "HTTP 404"; then
              skip_label "${role} is not a repository collaborator"
            else
              echo "Unexpected error checking repository permission for ${role} ${user}: ${response}" >&2
              exit 1
            fi
          }

          require_review_team_member() {
            user="$1"

            if [ -z "$REVIEW_TEAMS" ]; then
              skip_label "no REVIEW_TEAMS configured"
            fi

            echo "Checking configured review teams for ${user}"
            for team in $REVIEW_TEAMS; do
              if response=$(GH_TOKEN="$CHECK_TOKEN" gh api \
                  -H "Accept: application/vnd.github+json" \
                  "/orgs/temporalio/teams/${team}/memberships/${user}" 2>&1); then
                if [ "$(echo "$response" | jq -r '.state')" = "active" ]; then
                  echo "${user} is an active member of temporalio/${team}"
                  return 0
                fi
              elif echo "$response" | grep -q "HTTP 404"; then
                : # user is not a member of this team; try the next one
              else
                echo "Unexpected error checking temporalio/${team} membership: ${response}" >&2
                exit 1
              fi
            done

            skip_label "author is not in a configured review team"
          }

          echo "Fetching labels for PR #${PR_NUMBER}"
          labels=$(GH_TOKEN="$CHECK_TOKEN" gh api -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/issues/${PR_NUMBER}" --jq '.labels[].name')
          if [ -z "$labels" ]; then
            echo "PR #${PR_NUMBER} has no labels"
          else
            echo "PR #${PR_NUMBER} labels:"
            printf '%s\n' "$labels" | sed 's/^/- /'
          fi

          if has_label "$REVIEW_OPT_OUT_LABEL"; then
            skip_label "skip label '${REVIEW_OPT_OUT_LABEL}' is present"
          fi
          echo "No skip label '${REVIEW_OPT_OUT_LABEL}' found on PR #${PR_NUMBER}"

          if has_label "$REVIEW_OPT_IN_LABEL"; then
            skip_label "request label '${REVIEW_OPT_IN_LABEL}' is already present"
          fi
          echo "No request label '${REVIEW_OPT_IN_LABEL}' found on PR #${PR_NUMBER}"

          require_org_member "$AUTHOR" "author"
          require_repo_write "$AUTHOR" "author"
          require_review_team_member "$AUTHOR"
          add_review_label "author is in a configured review team"
