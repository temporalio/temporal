x-healthcheck-defaults: &healthcheck-defaults
  interval: 1s
  timeout: 3s
  retries: 60

services:
  cassandra:
    image: cassandra:5.0
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_LISTEN_ADDRESS: 127.0.0.1
      # Heap sized for single-node test workloads (single keyspace per test,
      # low data volume); 2G was overprovisioned. Saves ~1G RSS per cass_*
      # job vs the 2G default.
      MAX_HEAP_SIZE: "1G"
      HEAP_NEWSIZE: "100M"
      # native_transport_max_threads: handle more concurrent connections.
      # ring_delay_ms / skip_wait_for_gossip_to_settle / initial_token /
      # num_tokens / consistent.rangemovement: skip the ~30s gossip-settle
      # wait that's pointless on a single-node test cluster.
      JVM_EXTRA_OPTS: >-
        -Dcassandra.native_transport_max_threads=512
        -Dcassandra.ring_delay_ms=1000
        -Dcassandra.skip_wait_for_gossip_to_settle=0
        -Dcassandra.initial_token=0
        -Dcassandra.num_tokens=1
        -Dcassandra.consistent.rangemovement=false
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]

  mysql:
    image: mysql:8.0.29-oracle
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    # Test-only: skip durable writes for speed. Trades durability (which we
    # don't need in CI) for fewer fsyncs during heavy write tests.
    command: >-
      --max-connections=500
      --innodb-flush-log-at-trx-commit=0
      --innodb-doublewrite=0
      --skip-log-bin
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]

  postgresql:
    image: postgres:13.5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    # Test-only: skip durable writes for speed. Trades durability (which we
    # don't need in CI) for fewer fsyncs during heavy write tests.
    command: >-
      postgres
      -c max_connections=500
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
    volumes:
      - ./postgresql-init:/docker-entrypoint-initdb.d
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U temporal"]

  elasticsearch:
    image: elasticsearch:7.10.1
    ports:
      - "9200:9200"
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]

  elasticsearch8:
    image: elasticsearch:8.5.0
    ports:
      - "9200:9200"
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]

  opensearch2:
    image: opensearchproject/opensearch:2
    ports:
      - "9200:9200"
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]

  opensearch3:
    image: opensearchproject/opensearch:3
    ports:
      - "9200:9200"
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
