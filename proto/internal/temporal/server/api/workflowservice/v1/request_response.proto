syntax = "proto3";

package temporal.server.api.workflowservice.v1;

option go_package = "go.temporal.io/server/api/workflowservice/v1;workflowservice";

import "temporal/server/api/taskqueue/v1/message.proto";

message GetDeploymentStatsRequest {
    string namespace = 1;

    // Name of the deployment to return stats for.
    // If empty, the deployment version needs to be provided.
    string deployment_name = 2;

    // Deployment version to return stats for.
    // If empty, the deployment name needs to be provided and
    // the current version will be queried.
    string deployment_version = 3;
}

message GetDeploymentStatsResponse {
    // An unsorted list of stats for each task queue in the deployment version.
    repeated temporal.server.api.taskqueue.v1.DetailedTaskQueueStats task_queue_stats = 3;

    // TODO: aggregated backlog
}
