syntax = "proto3";

package temporal.server.api.testservice.v1;

import "temporal/server/api/testservice/v1/request_response.proto";

option go_package = "go.temporal.io/server/api/testservice/v1;testservice";

// The greeting service definition.
service TestService {
  // Sends a greeting
  rpc SendHello(SendHelloRequest) returns (SendHelloResponse) {}
}
