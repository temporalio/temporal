syntax = "proto3";

package temporal.server.chasm.lib.nexusoperation.proto.v1;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "temporal/api/common/v1/message.proto";
import "temporal/api/failure/v1/message.proto";
import "temporal/api/sdk/v1/user_metadata.proto";

option go_package = "go.temporal.io/server/chasm/lib/nexusoperation/gen/nexusoperationpb;nexusoperationpb";

message OperationState {
  // Current status of the operation.
  OperationStatus status = 1;

  // Endpoint ID - used internally to avoid failing requests when endpoint is renamed.
  string endpoint_id = 2;

  // Endpoint name - resolved from the endpoint registry for this workflow's namespace.
  string endpoint = 3;

  // Service name.
  string service = 4;

  // Operation name.
  string operation = 5;

  // The time when the operation was scheduled.
  google.protobuf.Timestamp scheduled_time = 6;

  // Schedule-to-start timeout for this operation.
  google.protobuf.Duration schedule_to_start_timeout = 7;

  // Start-to-close timeout for this operation.
  google.protobuf.Duration start_to_close_timeout = 8;

  // Schedule-to-close timeout for this operation.
  google.protobuf.Duration schedule_to_close_timeout = 9;

  // Unique request ID allocated for all retry attempts of the StartOperation request.
  string request_id = 10;

  // Opaque data injected by the parent (e.g. workflow) for its own bookkeeping.
  // The operation component itself does not interpret this field.
  google.protobuf.Any parent_data = 11;

  // The number of attempts made to deliver the start operation request.
  // This number represents a minimum bound since the attempt is incremented after the request completes.
  int32 attempt = 12;

  // The time when the last attempt completed.
  google.protobuf.Timestamp last_attempt_complete_time = 13;

  // The last attempt's failure, if any.
  temporal.api.failure.v1.Failure last_attempt_failure = 14;

  // The time when the next attempt is scheduled (only set when in BACKING_OFF state).
  google.protobuf.Timestamp next_attempt_schedule_time = 15;

  // Operation token - only set for asynchronous operations after a successful StartOperation call.
  string operation_token = 16;

  // Set if the operation was terminated.
  NexusOperationTerminateState terminate_state = 17;
}

message NexusOperationTerminateState {
  // Request ID of the terminate request, used to deduplicate terminate requests.
  string request_id = 1;

  // The identity of the client who requested termination.
  string identity = 2;

  // The reason for requesting termination.
  string reason = 3;
}

enum OperationStatus {
  // Default value, unspecified status.
    OPERATION_STATUS_UNSPECIFIED = 0;
  // Operation is in the queue waiting to be executed or is currently executing.
    OPERATION_STATUS_SCHEDULED = 1;
  // Operation has failed with a retryable error and is backing off before the next attempt.
    OPERATION_STATUS_BACKING_OFF = 2;
  // Operation was started and will complete asynchronously.
    OPERATION_STATUS_STARTED = 3;
  // Operation succeeded.
  // This may happen either as a response to a start request or as reported via callback.
    OPERATION_STATUS_SUCCEEDED = 4;
  // Operation failed either when a start request encounters a non-retryable error or as reported via callback.
    OPERATION_STATUS_FAILED = 5;
  // Operation completed as canceled (may have not ever been delivered).
  // This may happen either as a response to a start request or as reported via callback.
    OPERATION_STATUS_CANCELED = 6;
  // Operation timed out - exceeded the user supplied schedule-to-close timeout.
  // Any attempts to complete the operation in this status will be ignored.
    OPERATION_STATUS_TIMED_OUT = 7;
}

message CancellationState {
  // Current status of the cancellation request.
  CancellationStatus status = 1;

  // The time when cancellation was requested.
  google.protobuf.Timestamp requested_time = 2;

  // The number of attempts made to deliver the cancel operation request.
  // This number represents a minimum bound since the attempt is incremented after the request completes.
  int32 attempt = 3;

  // The time when the last attempt completed.
  google.protobuf.Timestamp last_attempt_complete_time = 4;

  // The last attempt's failure, if any.
  temporal.api.failure.v1.Failure last_attempt_failure = 5;

  // The time when the next attempt is scheduled (only set when in BACKING_OFF state).
  google.protobuf.Timestamp next_attempt_schedule_time = 6;

  // Opaque data injected by the parent (e.g. workflow) for its own bookkeeping.
  // The cancellation component itself does not interpret this field.
  google.protobuf.Any parent_data = 7;

  // Request ID used to deduplicate cancel requests.
  string request_id = 8;

  // The identity of the client who requested cancellation.
  string identity = 9;

  // The reason for requesting cancellation.
  string reason = 10;
}

enum CancellationStatus {
  // Default value, unspecified status.
    CANCELLATION_STATUS_UNSPECIFIED = 0;
  // Cancellation request is in the queue waiting to be executed or is currently executing.
    CANCELLATION_STATUS_SCHEDULED = 1;
  // Cancellation request has failed with a retryable error and is backing off before the next attempt.
    CANCELLATION_STATUS_BACKING_OFF = 2;
  // Cancellation request succeeded.
    CANCELLATION_STATUS_SUCCEEDED = 3;
  // Cancellation request failed with a non-retryable error.
    CANCELLATION_STATUS_FAILED = 4;
  // The associated operation timed out - exceeded the user supplied schedule-to-close timeout.
    CANCELLATION_STATUS_TIMED_OUT = 5;
  // Cancellation request is blocked (eg: by circuit breaker).
    CANCELLATION_STATUS_BLOCKED = 6;
}

// OperationRequestData stores the original request data for a standalone Nexus operation.
// For workflow-embedded operations, request data is stored in the workflow's history events.
message OperationRequestData {
    // Serialized operation input.
    temporal.api.common.v1.Payload input = 1;

    // Nexus headers from the start request.
    // Keys have been normalized to lower case.
    map<string, string> nexus_header = 2;

    // Metadata for use by user interfaces to display the fixed as-of-start summary and details of the operation.
    temporal.api.sdk.v1.UserMetadata user_metadata = 3;

    // The identity of the client who started this operation.
    string identity = 4;
}
