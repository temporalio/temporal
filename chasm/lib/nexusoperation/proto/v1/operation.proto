syntax = "proto3";

package temporal.server.chasm.lib.nexusoperation.proto.v1;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "temporal/api/common/v1/message.proto";
import "temporal/api/failure/v1/message.proto";
import "temporal/api/sdk/v1/user_metadata.proto";

option go_package = "go.temporal.io/server/chasm/lib/nexusoperation/gen/nexusoperationpb;nexusoperationpb";

message OperationState {
  OperationStatus status = 1;
  string endpoint_id = 2;
  string endpoint = 3;
  string service = 4;
  string operation = 5;
  google.protobuf.Timestamp scheduled_time = 6;
  google.protobuf.Timestamp started_time = 7;
  google.protobuf.Timestamp closed_time = 8;
  google.protobuf.Duration schedule_to_start_timeout = 9;
  google.protobuf.Duration start_to_close_timeout = 10;
  google.protobuf.Duration schedule_to_close_timeout = 11;
  string request_id = 12;
  google.protobuf.Any parent_data = 13;
  int32 attempt = 14;
  google.protobuf.Timestamp last_attempt_complete_time = 15;
  temporal.api.failure.v1.Failure last_attempt_failure = 16;
  google.protobuf.Timestamp next_attempt_schedule_time = 17;
  string operation_token = 18;
  NexusOperationTerminateState terminate_state = 19;
}

message NexusOperationTerminateState {
  string request_id = 1;
  string identity = 2;
}

message OperationOutcome {
  message Successful {
    temporal.api.common.v1.Payload result = 1;
  }

  message Failed {
    temporal.api.failure.v1.Failure failure = 1;
  }

  oneof variant {
    Successful successful = 1;
    Failed failed = 2;
  }
}

enum OperationStatus {
  OPERATION_STATUS_UNSPECIFIED = 0;
  OPERATION_STATUS_SCHEDULED = 1;
  OPERATION_STATUS_BACKING_OFF = 2;
  OPERATION_STATUS_STARTED = 3;
  OPERATION_STATUS_SUCCEEDED = 4;
  OPERATION_STATUS_FAILED = 5;
  OPERATION_STATUS_CANCELED = 6;
  OPERATION_STATUS_TIMED_OUT = 7;
  OPERATION_STATUS_TERMINATED = 8;
}

message CancellationState {
  CancellationStatus status = 1;
  google.protobuf.Timestamp requested_time = 2;
  int32 attempt = 3;
  google.protobuf.Timestamp last_attempt_complete_time = 4;
  temporal.api.failure.v1.Failure last_attempt_failure = 5;
  google.protobuf.Timestamp next_attempt_schedule_time = 6;
  google.protobuf.Any parent_data = 7;
  string request_id = 8;
  string identity = 9;
  string reason = 10;
}

enum CancellationStatus {
  CANCELLATION_STATUS_UNSPECIFIED = 0;
  CANCELLATION_STATUS_SCHEDULED = 1;
  CANCELLATION_STATUS_BACKING_OFF = 2;
  CANCELLATION_STATUS_SUCCEEDED = 3;
  CANCELLATION_STATUS_FAILED = 4;
  CANCELLATION_STATUS_TIMED_OUT = 5;
  CANCELLATION_STATUS_BLOCKED = 6;
}

message OperationRequestData {
  temporal.api.common.v1.Payload input = 1;
  map<string, string> nexus_header = 2;
  temporal.api.sdk.v1.UserMetadata user_metadata = 3;
  string identity = 4;
}
