syntax = "proto3";

package temporal.server.chasm.lib.temporalfs.proto.v1;

option go_package = "go.temporal.io/server/chasm/lib/temporalfs/gen/temporalfspb;temporalfspb";

import "google/protobuf/timestamp.proto";
import "chasm/lib/temporalfs/proto/v1/state.proto";

// CreateFilesystem

message CreateFilesystemRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    string owner_workflow_id = 3;
    FilesystemConfig config = 4;
    string request_id = 5;
}

message CreateFilesystemResponse {
    string run_id = 1;
}

// GetFilesystemInfo

message GetFilesystemInfoRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
}

message GetFilesystemInfoResponse {
    FilesystemState state = 1;
    string run_id = 2;
}

// ArchiveFilesystem

message ArchiveFilesystemRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
}

message ArchiveFilesystemResponse {
}

// Lookup

message LookupRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 parent_inode_id = 3;
    string name = 4;
}

message LookupResponse {
    uint64 inode_id = 1;
    InodeAttr attr = 2;
}

// ReadChunks

message ReadChunksRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 inode_id = 3;
    int64 offset = 4;
    int64 read_size = 5;
}

message ReadChunksResponse {
    bytes data = 1;
}

// WriteChunks

message WriteChunksRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 inode_id = 3;
    int64 offset = 4;
    bytes data = 5;
}

message WriteChunksResponse {
    int64 bytes_written = 1;
}

// Mkdir

message MkdirRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 parent_inode_id = 3;
    string name = 4;
    uint32 mode = 5;
}

message MkdirResponse {
    uint64 inode_id = 1;
    InodeAttr attr = 2;
}

// ReadDir

message ReadDirRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 inode_id = 3;
}

message ReadDirResponse {
    repeated DirEntry entries = 1;
}

// Unlink

message UnlinkRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 parent_inode_id = 3;
    string name = 4;
}

message UnlinkResponse {
}

// Rmdir

message RmdirRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 parent_inode_id = 3;
    string name = 4;
}

message RmdirResponse {
}

// Rename

message RenameRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 old_parent_inode_id = 3;
    string old_name = 4;
    uint64 new_parent_inode_id = 5;
    string new_name = 6;
}

message RenameResponse {
}

// Getattr

message GetattrRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 inode_id = 3;
}

message GetattrResponse {
    InodeAttr attr = 1;
}

// Setattr

message SetattrRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 inode_id = 3;
    InodeAttr attr = 4;
    // Bitmask of which fields in attr to apply.
    uint32 valid = 5;
}

message SetattrResponse {
    InodeAttr attr = 1;
}

// Truncate

message TruncateRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 inode_id = 3;
    int64 new_size = 4;
}

message TruncateResponse {
}

// Link

message LinkRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 inode_id = 3;
    uint64 new_parent_inode_id = 4;
    string new_name = 5;
}

message LinkResponse {
    InodeAttr attr = 1;
}

// Symlink

message SymlinkRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 parent_inode_id = 3;
    string name = 4;
    string target = 5;
}

message SymlinkResponse {
    uint64 inode_id = 1;
    InodeAttr attr = 2;
}

// Readlink

message ReadlinkRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 inode_id = 3;
}

message ReadlinkResponse {
    string target = 1;
}

// Create (file)

message CreateFileRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 parent_inode_id = 3;
    string name = 4;
    uint32 mode = 5;
    uint32 flags = 6;
}

message CreateFileResponse {
    uint64 inode_id = 1;
    InodeAttr attr = 2;
}

// Mknod

message MknodRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    uint64 parent_inode_id = 3;
    string name = 4;
    uint32 mode = 5;
    uint32 dev = 6;
}

message MknodResponse {
    uint64 inode_id = 1;
    InodeAttr attr = 2;
}

// Statfs

message StatfsRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
}

message StatfsResponse {
    uint64 blocks = 1;
    uint64 bfree = 2;
    uint64 bavail = 3;
    uint64 files = 4;
    uint64 ffree = 5;
    uint32 bsize = 6;
    uint32 namelen = 7;
    uint32 frsize = 8;
}

// CreateSnapshot

message CreateSnapshotRequest {
    string namespace_id = 1;
    string filesystem_id = 2;
    string snapshot_name = 3;
}

message CreateSnapshotResponse {
    uint64 snapshot_txn_id = 1;
}

// Shared types

message InodeAttr {
    uint64 inode_id = 1;
    uint64 file_size = 2;
    uint32 mode = 3;
    uint32 nlink = 4;
    uint32 uid = 5;
    uint32 gid = 6;
    google.protobuf.Timestamp atime = 7;
    google.protobuf.Timestamp mtime = 8;
    google.protobuf.Timestamp ctime = 9;
}

message DirEntry {
    string name = 1;
    uint64 inode_id = 2;
    uint32 mode = 3;
}
