syntax = "proto3";

package temporal.server.chasm.lib.scheduler.proto.v1;

import "google/protobuf/duration.proto";

option go_package = "go.temporal.io/server/chasm/lib/scheduler/gen/schedulerpb;schedulerpb";

// Fires when the scheduler's idle period has lapsed, and the scheduler should
// be closed.
message SchedulerIdleTask {
  // Idle time total is set at time of task creation, so that if the dynamic config key
  // controlling idle time changes, task validation will be aware.
  google.protobuf.Duration idle_time_total = 1;
}

// Ensures that callbacks for all running buffered starts are attached. Used only
// during migration from V1, as workflows started by CHASM scheduler are started
// with callbacks attached.
message SchedulerCallbacksTask {}

// Buffers actions based on the schedule's specification.
message GeneratorTask {}

// Processes buffered actions, deciding whether to execute, delay, or discard.
message InvokerProcessBufferTask {}

// Drives execution of pending buffered actions to completion by starting,
// canceling, or terminating workflows.
message InvokerExecuteTask {}

// Buffers actions based on a manually-requested backfill.
message BackfillerTask {}

// Triggers migration from CHASM (V2) to workflow-backed (V1) scheduler.
message SchedulerMigrateToWorkflowTask {}
